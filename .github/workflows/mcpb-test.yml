# TEMPORARY — delete before merging to main.
#
# Builds the .mcpb bundles on every push to the branch this file lives on, so
# you can download and test them without cutting a tag/release and without any
# build tools (uv/npx) installed locally. No tag gate, no GitHub Release — the
# bundles are uploaded as run artifacts only.
#
# Run loop: push branch -> Actions tab -> this run -> download artifacts.

name: MCPB test build (temp)

on:
  push:
    branches: ['**']   # any branch, never tags — won't clash with release-mcpb.yml

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash             # git-bash on windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync --frozen --group mcpb

      - name: Build .mcpb
        run: |
          version=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          packaging/mcpb/build.sh "${{ matrix.target }}" "$version"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcpb-${{ matrix.target }}
          path: dist/mcpb/*.mcpb
          if-no-files-found: error
