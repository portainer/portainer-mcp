# See docs/release.md for the release process and one-time setup.
# Builds the Claude Desktop .mcpb bundles (one per platform) and attaches them
# to the GitHub Release on every X.Y.Z tag push.
#
# Deliberately off the PyPI/Docker critical path (separate workflow): a
# PyInstaller hiccup must not block the wheel publish. PyInstaller can't
# cross-compile, so each platform builds on its own native runner.

name: Release (MCPB)

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash             # git-bash on windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync --frozen --group mcpb

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$version" ]; then
            echo "tag $tag does not match pyproject version $version" >&2
            exit 1
          fi

      # Mirror the other release workflows: a test failure blocks the artifact.
      - run: uv run pytest

      - name: Build .mcpb
        run: packaging/mcpb/build.sh "${{ matrix.target }}" "${GITHUB_REF#refs/tags/}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcpb-${{ matrix.target }}
          path: dist/mcpb/*.mcpb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write           # create/update the GitHub Release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: mcpb-*
          merge-multiple: true

      - name: Attach bundles to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "$tag" --generate-notes --verify-tag
          gh release upload "$tag" artifacts/*.mcpb --repo "$GITHUB_REPOSITORY" --clobber
