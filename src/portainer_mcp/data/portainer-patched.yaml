    get:
      description: 'List all environments(endpoints) based on the current user authorizations.
        Will

        return all environments(endpoints) if using an administrator or team leader
        account otherwise it will

        only return authorized environments(endpoints).

        **Access policy**: restricted'
      operationId: EndpointList
      parameters:
      - description: Start searching from
        in: query
        name: start
        schema:
          type: integer
      - description: Limit results to this value
        in: query
        name: limit
        schema:
          type: integer
      - description: Sort results by this value
        in: query
        name: sort
        schema:
          type: string
          enum:
          - Name
          - Group
          - Status
          - LastCheckIn
          - EdgeID
          - PlatformType
          - Health
          - Id
      - description: Order sorted results by desc/asc
        in: query
        name: order
        schema:
          type: integer
      - description: If true, an `X-Update-Available` header will be added to the
          response to indicate if an update is available
        in: query
        name: updateInformation
        schema:
          type: boolean
      - description: If true, an `X-K8S-Env-Admin` header will be added to the response
          to indicate if the user is a K8S environment admin for any of the returned
          environments
        in: query
        name: k8sEnvAdmin
        schema:
          type: boolean
      - description: Search query
        in: query
        name: search
        schema:
          type: string
      - description: List environments(endpoints) of these groups
        in: query
        name: groupIds
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: List environments(endpoints) by this status
        in: query
        name: status
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: List environments(endpoints) of this type
        in: query
        name: types
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: search environments(endpoints) with these tags (depends on tagsPartialMatch)
        in: query
        name: tagIds
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: If true, will return environment(endpoint) which has one of tagIds,
          if false (or missing) will return only environments(endpoints) that has
          all the tags
        in: query
        name: tagsPartialMatch
        schema:
          type: boolean
      - description: will return only these environments(endpoints)
        in: query
        name: endpointIds
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: will exclude these environments(endpoints)
        in: query
        name: excludeIds
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: If true, will return environment(endpoint) that were provisioned
        in: query
        name: provisioned
        schema:
          type: boolean
      - description: will return only environments with on of these agent versions
        in: query
        name: agentVersions
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      - description: if exists true show only edge async agents, false show only standard
          edge agents. if missing, will show both types (relevant only for edge agents)
        in: query
        name: edgeAsync
        schema:
          type: boolean
      - description: if true, show only untrusted edge agents, if false show only
          trusted edge agents (relevant only for edge agents)
        in: query
        name: edgeDeviceUntrusted
        schema:
          type: boolean
      - description: if bigger then zero, show only edge agents that checked-in in
          the last provided seconds (relevant only for edge agents)
        in: query
        name: edgeCheckInPassedSeconds
        schema:
          type: number
      - description: if true, the snapshot data won't be retrieved
        in: query
        name: excludeSnapshots
        schema:
          type: boolean
      - description: will return only environments(endpoints) with this name
        in: query
        name: name
        schema:
          type: string
      - description: Filter environments by partial name match (case-insensitive,
          searches name only)
        in: query
        name: nameFilter
        schema:
          type: string
      - description: only applied when edgeStackId exists. Filter the returned environments
          based on their deployment status in the stack (not the environment status!)
        in: query
        name: edgeStackStatus
        schema:
          type: string
      - description: List environments(endpoints) of these edge groups
        in: query
        name: edgeGroupIds
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: Exclude environments(endpoints) of these edge groups
        in: query
        name: excludeEdgeGroupIds
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: If true, will apply policy data to the returned environments(endpoints)
        in: query
        name: policy
        schema:
          type: boolean
      - description: List environments(endpoints) associated with these policies
        in: query
        name: policyIds
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
      - description: Filter environments by policy status (applied, failed, in_progress,
          warning, not_supported). Only applies when policyIds is specified.
        in: query
        name: policyStatus
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Endpoints
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/portaineree.Endpoint'
                type: array
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: List environments(endpoints)
      tags:
      - endpoints
    post:
      description: 'Create a new environment(endpoint) that will be used to manage
        an environment(endpoint).

        **Access policy**: administrator'
      operationId: EndpointCreate
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Name:
                  description: 'Name that will be used to identify this environment(endpoint)
                    (example: my-environment)'
                  type: string
                EndpointCreationType:
                  description: 'Environment(Endpoint) type. Value must be one of:
                    1 (Local Docker environment), 2 (Agent environment), 3 (Azure
                    environment), 4 (Edge agent environment) or 5 (Local Kubernetes
                    Environment)'
                  type: integer
                ContainerEngine:
                  description: 'Container engine used by the environment(endpoint).
                    Value must be one of: ''docker'' or ''podman'''
                  type: string
                URL:
                  description: 'URL or IP address of a Docker host (example: docker.mydomain.tld:2375).
                    Defaults to local if not specified (Linux: /var/run/docker.sock,
                    Windows: //./pipe/docker_engine). Cannot be empty if EndpointCreationType
                    is set to 4 (Edge agent environment)'
                  type: string
                PublicURL:
                  description: 'URL or IP address where exposed containers will be
                    reachable. Defaults to URL if not specified (example: docker.mydomain.tld:2375)'
                  type: string
                GroupID:
                  description: Environment(Endpoint) group identifier. If not specified
                    will default to 1 (unassigned).
                  type: integer
                TLS:
                  description: Require TLS to connect against this environment(endpoint).
                    Must be true if EndpointCreationType is set to 2 (Agent environment)
                  type: boolean
                TLSSkipVerify:
                  description: Skip server verification when using TLS. Must be true
                    if EndpointCreationType is set to 2 (Agent environment)
                  type: boolean
                TLSSkipClientVerify:
                  description: Skip client verification when using TLS. Must be true
                    if EndpointCreationType is set to 2 (Agent environment)
                  type: boolean
                TLSCACertFile:
                  description: TLS CA certificate file
                  type: string
                  format: binary
                TLSCertFile:
                  description: TLS client certificate file
                  type: string
                  format: binary
                TLSKeyFile:
                  description: TLS client key file
                  type: string
                  format: binary
                AzureApplicationID:
                  description: Azure application ID. Required if environment(endpoint)
                    type is set to 3
                  type: string
                AzureTenantID:
                  description: Azure tenant ID. Required if environment(endpoint)
                    type is set to 3
                  type: string
                AzureAuthenticationKey:
                  description: Azure authentication key. Required if environment(endpoint)
                    type is set to 3
                  type: string
                TagIds:
                  description: List of tag identifiers to which this environment(endpoint)
                    is associated
                  type: array
                  items:
                    type: integer
                EdgeCheckinInterval:
                  description: The check in interval for edge agent (in seconds)
                  type: integer
                EdgeTunnelServerAddress:
                  description: URL or IP address that will be used to establish a
                    reverse tunnel. Required when settings.EnableEdgeComputeFeatures
                    is set to false or when settings.Edge.TunnelServerAddress is not
                    set
                  type: string
                EdgeAsyncMode:
                  description: Enable async mode for edge agent
                  type: boolean
                Gpus:
                  description: List of GPUs - json stringified array of {name, value}
                    structs
                  type: string
              required:
              - Name
              - EndpointCreationType
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '409':
          description: Name is not unique
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Create a new environment(endpoint)
      tags:
      - endpoints
