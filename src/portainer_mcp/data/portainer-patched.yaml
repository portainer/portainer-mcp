            \ is satisfied if the container exit code is in the\n  set of specified\
            \ values.\n- NotIn: the requirement is satisfied if the container exit\
            \ code is\n  not in the set of specified values.\n+required"
        values:
          description: 'Specifies the set of values to check for container exit codes.

            At most 255 elements are allowed.

            +optional

            +listType=set'
          items:
            type: integer
          type: array
      type: object
    v1.ContainerRestartRuleOnExitCodesOperator:
      enum:
      - In
      - NotIn
      type: string
      x-enum-varnames:
      - ContainerRestartRuleOnExitCodesOpIn
      - ContainerRestartRuleOnExitCodesOpNotIn
