openapi: 3.0.0
info:
  contact:
    email: info@portainer.io
  description: "The Portainer API is an HTTP API served by Portainer. It is used by\
    \ the Portainer UI, and anything you can do in the UI can also be done via the\
    \ HTTP API.\n\nAPI examples are available in the [Portainer documentation](https://documentation.portainer.io/api/api-examples/)\n\
    \nYou can find out more about Portainer [on our website](http://portainer.io)\
    \ and get some support on [Slack](http://portainer.io/slack/).\n\n# Authentication\n\
    \nMost of the API endpoints require authentication, as well as some level of authorization.\n\
    Portainer uses JSON Web Tokens to manage authentication. You must provide a token\
    \ in the **Authorization** header of each request using the **Bearer** scheme.\n\
    \nExample:\n\n```\nBearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwidXNlcm5hbWUiOiJhZG1pbiIsInJvbGUiOjEsImV4cCI6MTQ5OTM3NjE1NH0.NJ6vE8FY1WG6jsRQzfMqeatJ4vh2TWAeeYfDhP71YEE\n\
    ```\n\n# Security\n\nEach API endpoint has an associated access policy, documented\
    \ in its description.\n\nThe following policies are available:\n\n- Public access\n\
    - Authenticated access\n- Restricted access\n- Administrator access\n\n### Public\
    \ access\n\nNo authentication is required.\n\n### Authenticated access\n\nAuthentication\
    \ is required.\n\n### Restricted access\n\nAuthentication is required. Additional\
    \ checks may apply to verify access to the resource, and returned data may be\
    \ filtered.\n\n### Administrator access\n\nAuthentication and an administrator\
    \ role are both required.\n\n# Execute Docker requests\n\nPortainer does not expose\
    \ dedicated endpoints for managing Docker resources (create a container, remove\
    \ a volume, etc).\n\nInstead, it acts as a reverse-proxy to the Docker HTTP API,\
    \ allowing you to execute Docker requests via the Portainer HTTP API.\n\nTo do\
    \ so, use the `/endpoints/{id}/docker` endpoint. Note that this endpoint is not\
    \ documented below due to Swagger limitations. It has a restricted access policy,\
    \ so authentication is still required. Any request made to this endpoint is proxied\
    \ to the Docker API of the associated environment - request and response objects\
    \ are identical to those in the [Docker official documentation](https://docs.docker.com/engine/api).\n\
    \n# Private Registry\n\nWhen using a private registry, include a Base64-encoded\
    \ JSON string in the request header. The header parameter name is `X-Registry-Auth`\
    \ and the value should encode the following structure: \u2018{\"registryId\":\\\
    <registryId\\>}\u2019 where `<registryId>` is the ID of the registry where the\
    \ repository was created.\n \nExample encoded value:\n\n```\neyJyZWdpc3RyeUlkIjoxfQ==\n\
    ```\n"
  title: PortainerEE API
  version: 2.42.0
paths:
  /auth:
    post:
      description: '**Access policy**: public

        Use this environment(endpoint) to authenticate against Portainer using a username
        and password.'
      operationId: AuthenticateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth.authenticatePayload'
        description: Credentials used for authentication
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth.authenticateResponse'
        '400':
          description: Invalid request
        '422':
          description: Invalid Credentials
        '500':
          description: Server error
      summary: Authenticate
      tags:
      - auth
  /auth/logout:
    post:
      description: '**Access policy**: public'
      operationId: Logout
      responses:
        '204':
          description: Success
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Logout
      tags:
      - auth
  /auth/oauth/validate:
    post:
      description: '**Access policy**: public'
      operationId: ValidateOAuth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth.oauthPayload'
        description: OAuth Credentials used for authentication
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth.authenticateResponse'
        '400':
          description: Invalid request
        '422':
          description: Invalid Credentials
        '500':
          description: Server error
      summary: Authenticate with OAuth
      tags:
      - auth
  /auto_updates:
    get:
      description: '**Access policy**: administrator'
      operationId: AutoUpdateList
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/autoupdates.listResponse'
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: List auto updates
      tags:
      - auto_updates
  /backup:
    post:
      description: 'Creates an archive with a system data snapshot that could be used
        to restore the system.

        **Access policy**: admin'
      operationId: Backup
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/backup.backupPayload'
        description: An object contains the password to encrypt the backup with
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Creates an archive with a system data snapshot that could be used to
        restore the system.
      tags:
      - backup
  /backup/azure/execute:
    post:
      description: 'Creates a system snapshot archive and uploads it to the configured
        Azure Blob container

        **Access policy**: administrator'
      operationId: BackupToAzureBlob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/portaineree.AzureBlobBackupSettings'
        description: Azure Blob backup settings
        required: true
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Execute an ad-hoc backup to Azure Blob Storage
      tags:
      - backup
  /backup/azure/restore:
    post:
      description: '**Access policy**: public'
      operationId: RestoreFromAzureBlob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/backup.restoreAzureSettings'
        description: Azure Blob location and credentials
        required: true
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      summary: Restore system state from an Azure Blob Storage backup
      tags:
      - backup
  /backup/azure/settings:
    get:
      description: '**Access policy**: administrator'
      operationId: AzureBlobBackupSettingsFetch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.AzureBlobBackupSettings'
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Fetch Azure Blob Storage backup settings
      tags:
      - backup
    post:
      description: '**Access policy**: administrator'
      operationId: UpdateAzureBlobSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/portaineree.AzureBlobBackupSettings'
        description: Azure Blob backup settings
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Update Azure Blob Storage backup settings and reschedule cron job
      tags:
      - backup
  /backup/azure/status:
    get:
      description: '**Access policy**: public'
      operationId: AzureBlobBackupStatusFetch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/backup.azureBackupStatus'
        '500':
          description: Server error
      summary: Fetch the status of the last scheduled Azure Blob backup run
      tags:
      - backup
  /backup/azure/test:
    post:
      description: 'Verifies that the supplied credentials can reach and access the
        target container

        **Access policy**: administrator'
      operationId: AzureBlobTestConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/portaineree.AzureBlobBackupSettings'
        description: Azure Blob connection settings
        required: true
      responses:
        '204':
          description: Connection successful
        '400':
          description: Invalid request or Azure authentication failed
        '404':
          description: Container not found
        '500':
          description: Server error
        '502':
          description: Network error reaching Azure storage endpoint
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Test connectivity to an Azure Blob Storage container
      tags:
      - backup
  /backup/local/run:
    post:
      description: '**Access policy**: administrator'
      operationId: RunLocalBackupNow
      responses:
        '204':
          description: Success
        '409':
          description: A backup is already in progress
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Trigger an immediate local backup outside of the cron schedule
      tags:
      - backup
  /backup/local/settings:
    get:
      description: '**Access policy**: administrator'
      operationId: LocalBackupSettingsFetch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.LocalBackupSettings'
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Fetch local scheduled backup settings
      tags:
      - backup
    post:
      description: '**Access policy**: administrator'
      operationId: UpdateLocalBackupSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/portaineree.LocalBackupSettings'
        description: Local backup settings
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Updates local scheduled backup settings and restarts the cron job as
        needed
      tags:
      - backup
  /backup/local/status:
    get:
      description: '**Access policy**: administrator'
      operationId: LocalBackupStatusFetch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/backup.localBackupStatus'
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Fetch the status of the last scheduled local backup run
      tags:
      - backup
  /backup/s3/execute:
    post:
      description: 'Creates an archive with a system data snapshot and upload it to
        the target S3 bucket

        **Access policy**: administrator'
      operationId: BackupToS3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/backup.s3BackupPayload'
        description: S3 backup settings
        required: true
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Execute backup to AWS S3 Bucket
      tags:
      - backup
  /backup/s3/restore:
    post:
      description: 'Triggers a system restore using details of s3 backup

        **Access policy**: public'
      operationId: RestoreFromS3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/backup.restoreS3Settings'
        description: S3 Location Payload
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      summary: Triggers a system restore using details of s3 backup
      tags:
      - backup
  /backup/s3/settings:
    get:
      description: '**Access policy**: administrator'
      operationId: BackupSettingsFetch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.S3BackupSettings'
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Fetch s3 backup settings/configurations
      tags:
      - backup
    post:
      description: 'Updates stored s3 backup settings and updates running cron jobs
        as needed

        **Access policy**: administrator'
      operationId: UpdateS3Settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/portaineree.S3BackupSettings'
        description: S3 backup settings
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Updates stored s3 backup settings and updates running cron jobs as
        needed
      tags:
      - backup
  /backup/s3/status:
    get:
      description: '**Access policy**: public'
      operationId: BackupStatusFetch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/backup.backupStatus'
        '500':
          description: Server error
      summary: Fetch the status of the last scheduled backup run
      tags:
      - backup
  /cloud/amazon/provision:
    post:
      description: 'Provision a new KaaS cluster and create an environment.

        **Access policy**: administrator'
      operationId: provisionClusterAmazon
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/providers.AmazonProvisionPayload'
        description: KaaS cluster provisioning details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '500':
          description: Server error
        '503':
          description: Missing configuration
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Provision a new Amazon EKS and create an environment
      tags:
      - kaas
  /cloud/azure/provision:
    post:
      description: 'Provision a new KaaS cluster and create an environment.

        **Access policy**: administrator'
      operationId: provisionClusterAzure
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/providers.AzureProvisionPayload'
        description: KaaS cluster provisioning details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '500':
          description: Server error
        '503':
          description: Missing configuration
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Provision a new Microsoft Azure cluster and create an environment
      tags:
      - kaas
  /cloud/credentials:
    get:
      description: 'getAll cloud credential

        **Access policy**: authenticated'
      operationId: getAll
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: getAll cloud credentials
      tags:
      - cloud_credentials
    post:
      description: 'Create a cloud credential

        **Access policy**: authenticated'
      operationId: Create
      requestBody:
        $ref: '#/components/requestBodies/Create'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Create a cloud credential
      tags:
      - cloud_credentials
  /cloud/credentials/{id}:
    delete:
      description: 'Delete a cloud credential

        **Access policy**: authenticated'
      operationId: cloudCredsDelete
      parameters:
      - description: ID of the cloud credential
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '403':
          description: 'Forbidden: the requested credential is associated with endpoint(s)'
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Delete a cloud credential
      tags:
      - cloud_credentials
    get:
      description: 'getByID gets a cloud credential by ID

        **Access policy**: authenticated'
      operationId: cloudCredsGetByID
      parameters:
      - description: ID of the cloud credential
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: getByID gets a cloud credential by ID
      tags:
      - cloud_credentials
    put:
      description: 'Update a cloud credential

        **Access policy**: authenticated'
      operationId: cloudCredsUpdate
      parameters:
      - description: ID of the cloud credential
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        $ref: '#/components/requestBodies/Create'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.CloudCredential'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Update a cloud credential
      tags:
      - cloud_credentials
  /cloud/endpoints/{environmentId}/upgrade:
    post:
      description: 'Upgrade the cluster to the next stable kubernetes version.

        **Access policy**: authenticated'
      operationId: upgrade
      parameters:
      - description: Environment(Endpoint) identifier
        in: path
        name: environmentId
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Success
        '400':
          description: Invalid request
        '403':
          description: Permission denied
        '500':
          description: Server error
        '503':
          description: Missing configuration
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Upgrade the cluster to the next stable kubernetes version.
      tags:
      - kaas
  /cloud/gitcredentials:
    get:
      description: 'Get shared git credentials

        **Access policy**: Administrator only.'
      operationId: SharedGitGetAll
      responses:
        '201':
          description: Success
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
        jwt: []
      summary: Get Shared Git Credentials
      tags:
      - cloud_credentials
    post:
      description: 'Create a shared git credential

        **Access policy**: Administrator only.'
      operationId: SharedGitCreate
      responses:
        '201':
          description: Success
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
        jwt: []
      summary: Create Shared Git Credential
      tags:
      - cloud_credentials
  /cloud/gke/provision:
    post:
      description: 'Provision a new KaaS cluster and create an environment.

        **Access policy**: administrator'
      operationId: provisionClusterGKE
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/providers.GKEProvisionPayload'
        description: KaaS cluster provisioning details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.Endpoint'
        '400':
          description: Invalid request
        '500':
          description: Server error
        '503':
          description: Missing configuration
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Provision a new Google Kubernetes (GKE) cluster and create an environment
      tags:
      - kaas
  /custom_templates:
    get:
      description: 'List available custom templates.

        **Access policy**: authenticated'
      operationId: CustomTemplateList
      parameters:
      - description: Template types
        in: query
        name: type
        required: true
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - 1
            - 2
            - 3
            type: integer
      - description: Filter by edge templates
        in: query
        name: edge
        schema:
          type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/portaineree.CustomTemplate'
                type: array
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: List available custom templates
      tags:
      - custom_templates
    post:
      deprecated: true
      description: 'Create a custom template.

        **Access policy**: authenticated'
      operationId: CustomTemplateCreate
      parameters:
      - description: method for creating template
        in: query
        name: method
        required: true
        schema:
          type: string
          enum:
          - string
          - file
          - repository
      requestBody:
        content:
          application/json:
            schema:
              type: object
          multipart/form-data:
            schema:
              type: object
        description: for body documentation see the relevant /custom_templates/{method}
          endpoint
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.CustomTemplate'
        '400':
          description: Invalid request
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Create a custom template
      tags:
      - custom_templates
  /custom_templates/{id}:
    delete:
      description: 'Remove a template.

        **Access policy**: authenticated'
      operationId: CustomTemplateDelete
      parameters:
      - description: Template identifier
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: Success
        '400':
          description: Invalid request
        '403':
          description: Access denied to resource
        '404':
          description: Template not found
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Remove a template
      tags:
      - custom_templates
    get:
      description: 'Retrieve details about a template.

        **Access policy**: authenticated'
      operationId: CustomTemplateInspect
      parameters:
      - description: Template identifier
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.CustomTemplate'
        '400':
          description: Invalid request
        '404':
          description: Template not found
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Inspect a custom template
      tags:
      - custom_templates
    put:
      description: 'Update a template.

        **Access policy**: authenticated'
      operationId: CustomTemplateUpdate
      parameters:
      - description: Template identifier
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/customtemplates.customTemplateUpdatePayload'
        description: Template details
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portaineree.CustomTemplate'
        '400':
          description: Invalid request
        '403':
          description: Permission denied to access template
        '404':
          description: Template not found
        '500':
          description: Server error
      security:
      - ApiKeyAuth: []
      - jwt: []
      summary: Update a template
      tags:
      - custom_templates
  /custom_templates/{id}/file:
    get:
      description: 'Retrieve the content of the Stack file for the specified custom
        template

        **Access policy**: authenticated'
      operationId: CustomTemplateFile
      parameters:
      - description: Template identifier
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
